<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜字組卡牌</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #1a1a1a;
            font-family: sans-serif;
        }

        #app {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        .card {
            width: 90%;
            height: 28%; /* 三個卡牌平分高度 */
            background: #ffffff;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .word {
            font-size: 15vw; /* 大字體 */
            font-weight: bold;
            color: #222;
            letter-spacing: 5px;
        }

        .finished {
            background: #444;
            color: #888;
        }

        .swipe-anim {
            transform: translateX(-120%) rotate(-5deg);
            opacity: 0;
        }
        
        #instruction {
            position: fixed;
            bottom: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="card2" class="card"><div class="word"></div></div>
    <div id="card3" class="card"><div class="word"></div></div>
    <div id="card4" class="card"><div class="word"></div></div>
    <div id="instruction">⬅️ 向左掃更換一組</div>
</div>

    "多士爐", "微波爐", "電飯煲", "熱水壺", "指甲鉗", "放大鏡", "太陽油", "潤唇膏", "洗面奶", "沐浴露",

    "三文治", "漢堡包", "雞蛋仔", "格仔餅", "紅豆冰", "檸檬茶", "菠蘿包", "叉燒包", "瑜伽班", "大會堂",

    "糯米雞", "雙皮奶", "捉迷藏", "奇異果", "救生圈", "潛水鏡", "滑板車", "垃圾桶", "啄木鳥", "長頸鹿",
    "班馬線", "便利店", "棉花糖", "車仔麵", "碗仔翅", "菠蘿油", "潛水艇", "直升機", "救護車", "消防車",

    "萬里長城", "鐵達尼號", "星光大道", "千與千尋", "數碼暴龍", "鬼滅之刃", "火影忍者", "刀劍神域", "哆啦A夢", "得閒飲茶",

],
    };

    // 複製並隨機打亂陣列的函數
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    // 初始化已打亂的池子
    let pools = {
        2: shuffle([...sourceData[2]]),
        3: shuffle([...sourceData[3]]),
        4: shuffle([...sourceData[4]])
    };

    function updateCards() {
        const ids = [2, 3, 4];
        let hasData = false;

        ids.forEach(len => {
            const card = document.getElementById(`card${len}`);
            const wordDiv = card.querySelector('.word');
            
            // 先做動畫
            card.classList.add('swipe-anim');

            setTimeout(() => {
                if (pools[len].length > 0) {
                    wordDiv.innerText = pools[len].pop();
                    hasData = true;
                } else {
                    wordDiv.innerText = "完";
                    card.classList.add('finished');
                }

                // 重置動畫位置
                card.style.transition = 'none';
                card.classList.remove('swipe-anim');
                card.style.transform = 'translateX(100%)';
                
                card.offsetHeight; // 強制重繪
                
                card.style.transition = 'all 0.3s ease';
                card.style.transform = 'translateX(0)';
            }, 300);
        });
    }

    // 初始化第一次顯示
    [2, 3, 4].forEach(len => {
        const wordDiv = document.querySelector(`#card${len} .word`);
        wordDiv.innerText = pools[len].pop() || "完";
    });

    // 綁定手勢到整個容器
    const hammer = new Hammer(document.getElementById('app'));
    hammer.on("swipeleft", () => {
        updateCards();
    });
</script>

</body>
</html>
